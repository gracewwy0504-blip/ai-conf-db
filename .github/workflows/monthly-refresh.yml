name: Monthly Refresh

on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:
    inputs:
      deep_refresh:
        description: "Deep refresh (Computex detail pages + HQ re-crawl). Can take hours."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip beautifulsoup4

      - name: Sync exhibitor sources
        run: |
          if [ "${{ github.event.inputs.deep_refresh }}" = "true" ]; then
            python sync_exhibitors.py --conf all
          else
            python sync_exhibitors.py --conf all --skip-details
          fi

      - name: Enrich company HQ
        run: |
          if [ "${{ github.event.inputs.deep_refresh }}" = "true" ]; then
            python scrape_company_hq.py --scope all --workers 4 --limit 500
          else
            python scrape_company_hq.py --apply-only
          fi

      - name: Enrich company pitch
        run: python enrich_company_pitch.py --scope all

      - name: Enrich conference focus
        run: python enrich_conf_focus.py

      - name: Build derived artifacts
        run: python scripts/build_site.py

      - name: Validate generated data
        run: python scripts/validate_data.py

      - name: Commit refreshed site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add exhibitor-data/ index.html README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh conference data"
          git push
